name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Create venv and install
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: make check
        run: |
          source .venv/bin/activate
          make check
